# Workspace-level Cargo configuration.
# jobs=1 fully serialises rustc invocations so only one crate compiles at a
# time. The windows-0.61.3 crate generates thousands of Win32 API bindings
# and requires a large contiguous heap allocation; running it concurrently with
# any other rustc process (or rust-analyzer) exhausts available RAM and causes
# STATUS_STACK_BUFFER_OVERRUN / memory allocation failures.
[build]
jobs = 1
# Use incremental compilation even in release to speed up rebuilds.
incremental = true

[profile.release]
# Keep minimal debug info for crash triage while allowing packaging-time stripping.
debug = 1
# Favor faster compile times over maximal runtime optimization.
codegen-units = 16
lto = false
