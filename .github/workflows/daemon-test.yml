name: Daemon RPC Test

on:
  push:
    branches: [main, master]
  workflow_dispatch:   # allows manual trigger

jobs:
  test-daemon:
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install Deno
        run: |
          $env:DENO_INSTALL = "$env:USERPROFILE\.deno"
          irm https://deno.land/install.ps1 | iex
          echo "$env:USERPROFILE\.deno\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install websockets library
        run: pip install websockets

      - name: Check workspace
        run: cargo check --workspace 2>&1 | Tee-Object -FilePath check_output.txt

      - name: Build daemon
        run: cargo build -p bonsai-daemon --release

      - name: Start daemon and run tests
        run: |
          # Start daemon in background
          Start-Process -NoNewWindow -FilePath "cargo" -ArgumentList "run","-p","bonsai-daemon" -PassThru | Out-Null
          Start-Sleep -Seconds 5

          # Run test script
          python tests/integration/test_daemon_local.py 2>&1 | Tee-Object -FilePath test_output.txt

          # Stop daemon
          Get-Process -Name "bonsai-daemon" -ErrorAction SilentlyContinue | Stop-Process -Force

      - name: Upload output files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daemon-test-results
          path: |
            check_output.txt
            test_output.txt

      - name: Show test results
        if: always()
        run: |
          Write-Output "=== Compile Output ==="
          Get-Content check_output.txt
          Write-Output "=== Test Output ==="
          Get-Content test_output.txt
