name: ClojureWasm CI (no Docker)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  clojurewasm-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk git curl unzip
      - name: Add wasm target
        run: |
          rustup target add wasm32-wasi
      - name: Run clojurewasm prereq check (CI)
        run: |
          bash runtimes/clojure-wasm/build-local.sh --ci

  clojurewasm-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - name: Install prerequisites
        shell: pwsh
        run: |
          choco install -y openjdk11 git curl
      - name: Add wasm target
        shell: pwsh
        run: |
          rustup target add wasm32-wasi
      - name: Run clojurewasm prereq check (CI)
        shell: pwsh
        run: |
          .\runtimes\clojure-wasm\build-local.ps1 -CI
