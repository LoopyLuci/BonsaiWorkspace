name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip
      - name: Install Babashka (linux)
        run: |
          ASSET_URL=$(curl -s https://api.github.com/repos/babashka/babashka/releases/latest \
            | jq -r '.assets[] | select(.name | test("linux-amd64")) | .browser_download_url' | head -n1)
          curl -L -o bb.tar.gz "$ASSET_URL"
          tar -xzf bb.tar.gz
          sudo mv bb /usr/local/bin/bb
          bb --version
      - name: Run tests
        run: cargo test --manifest-path bonsai-bot/Cargo.toml --all-features

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install Babashka (windows)
        shell: pwsh
        run: |
          $assets = (Invoke-RestMethod 'https://api.github.com/repos/babashka/babashka/releases/latest').assets
          $asset = $assets | Where-Object { $_.name -match 'windows-amd64' } | Select-Object -First 1
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile 'bb.zip'
          Expand-Archive bb.zip -DestinationPath tools
          $env:PATH = "${env:PATH};$PWD\tools"
          & tools\bb.exe --version
      - name: Run tests
        shell: pwsh
        run: cargo test --manifest-path bonsai-bot/Cargo.toml --all-features
