name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    env:
      BB_VERSION: 1.3.191
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip
      - name: Install Babashka (linux)
        run: |
          ASSET_URL="https://github.com/babashka/babashka/releases/download/v${BB_VERSION}/babashka-${BB_VERSION}-linux-amd64-static.tar.gz"
          curl -L -o bb.tar.gz "$ASSET_URL"
          tar -xzf bb.tar.gz
          sudo mv bb /usr/local/bin/bb
          bb --version
      - name: Run tests
        run: cargo test --manifest-path bonsai-bot/Cargo.toml --all-features

  build-windows:
    runs-on: windows-latest
    env:
      BB_VERSION: 1.3.191
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install Babashka (windows)
        shell: pwsh
        run: |
          $assetUrl = "https://github.com/babashka/babashka/releases/download/v$env:BB_VERSION/babashka-$env:BB_VERSION-windows-amd64.zip"
          Invoke-WebRequest -Uri $assetUrl -OutFile 'bb.zip'
          Expand-Archive bb.zip -DestinationPath tools
          $env:PATH = "${env:PATH};$PWD\tools"
          & tools\bb.exe --version
      - name: Run tests
        shell: pwsh
        run: cargo test --manifest-path bonsai-bot/Cargo.toml --all-features
