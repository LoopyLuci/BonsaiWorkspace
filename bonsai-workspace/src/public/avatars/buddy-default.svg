<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <style>
    .face { fill: #5ca4ea; }
    .face-shadow { fill: #4a93d9; }
    .eye-white { fill: #fff; }
    .pupil { fill: #1e1e1e; }
    .mouth { fill: #1e1e1e; }

    /* Blink animation — every 4s */
    .eyelid {
      fill: #5ca4ea;
      transform-origin: center 90px;
      animation: blink 4s infinite;
    }
    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(0); }
      93%, 97%      { transform: scaleY(1); }
    }

    /* Breathe animation — 3s cycle */
    .body-group {
      animation: breathe 3s ease-in-out infinite;
      transform-origin: 100px 220px;
    }
    @keyframes breathe {
      0%, 100% { transform: scaleY(1);    }
      50%       { transform: scaleY(1.012); }
    }

    /* All mouth shapes hidden by default; JS shows active one */
    .mouth { display: none; }
    .mouth.active { display: block; }
  </style>

  <g class="body-group">
    <!-- Head -->
    <ellipse cx="100" cy="105" rx="72" ry="78" class="face"/>
    <ellipse cx="100" cy="110" rx="60" ry="65" class="face-shadow" opacity="0.18"/>

    <!-- Leaf / antenna -->
    <line x1="100" y1="28" x2="100" y2="8" stroke="#3a8a3a" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="100" cy="6" rx="10" ry="6" fill="#4ec94e" transform="rotate(-20,100,6)"/>

    <!-- Eyes -->
    <ellipse cx="72" cy="92" rx="14" ry="15" class="eye-white"/>
    <ellipse cx="72" cy="94" rx="7"  ry="8"  class="pupil"/>
    <ellipse cx="76" cy="91" rx="2.5" ry="2.5" fill="#fff"/>

    <ellipse cx="128" cy="92" rx="14" ry="15" class="eye-white"/>
    <ellipse cx="128" cy="94" rx="7"  ry="8"  class="pupil"/>
    <ellipse cx="132" cy="91" rx="2.5" ry="2.5" fill="#fff"/>

    <!-- Eyelids (blink overlay) -->
    <ellipse cx="72"  cy="92" rx="14" ry="15" class="eyelid"/>
    <ellipse cx="128" cy="92" rx="14" ry="15" class="eyelid" style="animation-delay:-1.3s"/>

    <!-- ── Mouth shapes (14 visemes) ─────────────────────── -->

    <!-- 0: Silence — tiny closed line -->
    <path data-viseme="0" class="mouth active"
      d="M84,138 Q100,140 116,138" stroke="#1e1e1e" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- 1: AE/AH — wide open oval -->
    <ellipse data-viseme="1" class="mouth"
      cx="100" cy="140" rx="18" ry="12"/>

    <!-- 2: EH/ER — medium open, wider than tall -->
    <ellipse data-viseme="2" class="mouth"
      cx="100" cy="139" rx="15" ry="8"/>

    <!-- 3: IY — wide flat smile -->
    <path data-viseme="3" class="mouth"
      d="M82,136 Q100,148 118,136" stroke="#1e1e1e" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- 4: AW/AO — round open -->
    <ellipse data-viseme="4" class="mouth"
      cx="100" cy="141" rx="14" ry="14"/>

    <!-- 5: OW/UH — small round -->
    <ellipse data-viseme="5" class="mouth"
      cx="100" cy="140" rx="10" ry="11"/>

    <!-- 6: UW — tiny pursed circle -->
    <ellipse data-viseme="6" class="mouth"
      cx="100" cy="140" rx="7" ry="8"/>

    <!-- 7: MBP — lips closed flat -->
    <path data-viseme="7" class="mouth"
      d="M85,138 Q100,137 115,138" stroke="#1e1e1e" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- 8: F/V — lower lip tucked under teeth -->
    <path data-viseme="8" class="mouth"
      d="M85,136 L115,136 Q108,146 92,146 Z"/>

    <!-- 9: TH — tongue tip between teeth -->
    <path data-viseme="9" class="mouth"
      d="M88,136 L112,136 Q106,143 94,143 Z"/>
    <ellipse data-viseme="9" class="mouth" cx="100" cy="135" rx="6" ry="3" fill="#e88"/>

    <!-- 10: TDS — teeth visible, narrow open -->
    <rect data-viseme="10" class="mouth"
      x="87" y="135" width="26" height="10" rx="3"/>
    <rect data-viseme="10" class="mouth"
      x="88" y="135" width="24" height="4" rx="2" fill="#fff"/>

    <!-- 11: CH — rounded with slight opening -->
    <ellipse data-viseme="11" class="mouth"
      cx="100" cy="139" rx="11" ry="7"/>

    <!-- 12: N — slight open, tongue up -->
    <path data-viseme="12" class="mouth"
      d="M87,136 L113,136 Q107,144 93,144 Z"/>

    <!-- 13: R — lips rounded, moderate open -->
    <ellipse data-viseme="13" class="mouth"
      cx="100" cy="140" rx="9" ry="9"/>

    <!-- Body stub (shirt) -->
    <ellipse cx="100" cy="220" rx="50" ry="28" fill="#3a6aaa"/>
    <rect x="50" y="200" width="100" height="28" rx="0" fill="#3a6aaa"/>
    <ellipse cx="100" cy="200" rx="50" ry="12" fill="#4a7aba"/>
  </g>
</svg>
