name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend-quality:
    name: Frontend Quality (Node 20)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: bonsai-workspace/src/package-lock.json

      - name: Install frontend deps
        working-directory: bonsai-workspace/src
        run: npm ci

      - name: Run Svelte/TS checks
        working-directory: bonsai-workspace/src
        run: |
          mkdir -p ../ci-artifacts
          set -o pipefail
          npx svelte-check 2>&1 | tee ../ci-artifacts/svelte-check.log

      - name: Build frontend
        working-directory: bonsai-workspace/src
        run: |
          set -o pipefail
          npm run build 2>&1 | tee ../ci-artifacts/frontend-build.log

      - name: Enforce frontend bundle budgets
        working-directory: bonsai-workspace/src
        run: |
          set -o pipefail
          npm run check:bundle 2>&1 | tee ../ci-artifacts/frontend-bundle-budget.log

      - name: Upload frontend artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-quality-logs
          path: bonsai-workspace/ci-artifacts/
          if-no-files-found: ignore

  vscode-extension-quality:
    name: VSCode Extension Quality (Node 20)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install extension deps
        working-directory: vscode-extension
        run: npm ci

      - name: Compile extension
        working-directory: vscode-extension
        run: |
          mkdir -p ../bonsai-workspace/ci-artifacts
          set -o pipefail
          npm run compile 2>&1 | tee ../bonsai-workspace/ci-artifacts/vscode-extension-compile.log

      - name: Typecheck extension tests
        working-directory: vscode-extension
        run: |
          set -o pipefail
          npm run test:typecheck 2>&1 | tee ../bonsai-workspace/ci-artifacts/vscode-extension-test-typecheck.log

      - name: Run extension tests
        working-directory: vscode-extension
        run: |
          set -o pipefail
          npm run test 2>&1 | tee ../bonsai-workspace/ci-artifacts/vscode-extension-test.log

      - name: Upload extension artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension-quality-logs
          path: bonsai-workspace/ci-artifacts/
          if-no-files-found: ignore

  rust-quality:
    name: Rust Quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux native dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libsqlite3-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            bonsai-workspace/src-tauri

      - name: Cargo check
        shell: bash
        run: |
          mkdir -p bonsai-workspace/ci-artifacts
          set -o pipefail
          cargo check --locked --manifest-path "bonsai-workspace/src-tauri/Cargo.toml" 2>&1 | tee bonsai-workspace/ci-artifacts/cargo-check-${{ matrix.os }}.log

      - name: Cargo clippy
        shell: bash
        run: |
          set -o pipefail
          cargo clippy --manifest-path "bonsai-workspace/src-tauri/Cargo.toml" --all-targets -- -D warnings 2>&1 | tee bonsai-workspace/ci-artifacts/cargo-clippy-${{ matrix.os }}.log

      - name: Cargo audit
        shell: bash
        run: |
          set -o pipefail
          cargo install cargo-audit --locked || true
          cargo audit --manifest-path "bonsai-workspace/src-tauri/Cargo.toml" 2>&1 | tee bonsai-workspace/ci-artifacts/cargo-audit-${{ matrix.os }}.log

      - name: Cargo unit tests
        shell: bash
        run: |
          set -o pipefail
          cargo test --manifest-path "bonsai-workspace/src-tauri/Cargo.toml" --lib -- --test-threads=1 2>&1 | tee bonsai-workspace/ci-artifacts/cargo-test-${{ matrix.os }}.log

      - name: Upload rust artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-quality-logs-${{ matrix.os }}
          path: bonsai-workspace/ci-artifacts/
          if-no-files-found: ignore

  routing-deterministic:
    name: Deterministic Routing Regression (Windows)
    runs-on: windows-latest
    timeout-minutes: 35
    env:
      BONSAI_UI_STEP_TIMEOUT_MS: "60000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: bonsai-workspace/src/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            bonsai-workspace/src-tauri

      - name: Install frontend deps
        working-directory: bonsai-workspace/src
        run: npm ci

      - name: Run deterministic suite with retries
        shell: pwsh
        working-directory: bonsai-workspace/src
        run: |
          New-Item -Path ../ci-artifacts -ItemType Directory -Force | Out-Null
          $maxAttempts = 3
          $passed = $false

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "Starting deterministic routing run attempt $attempt/$maxAttempts"
            $log = "../ci-artifacts/routing-attempt-$attempt.log"
            npm run test:agent-routing-ci *>&1 | Tee-Object -FilePath $log

            if ($LASTEXITCODE -eq 0) {
              $passed = $true
              break
            }

            Write-Host "Attempt $attempt failed with exit code $LASTEXITCODE"
          }

          if (-not $passed) {
            Write-Error "Deterministic routing suite failed after $maxAttempts attempts"
            exit 1
          }

      - name: Upload routing artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: routing-deterministic-logs
          path: bonsai-workspace/ci-artifacts/
          if-no-files-found: ignore

  api-smoke-orchestrated:
    name: API Smoke Orchestrated (Windows)
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      BONSAI_SKIP_UI: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: bonsai-workspace/src/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            bonsai-workspace/src-tauri

      - name: Install frontend deps
        working-directory: bonsai-workspace/src
        run: npm ci

      - name: Run orchestrated API smoke with retries
        shell: pwsh
        working-directory: bonsai-workspace/src
        run: |
          New-Item -Path ../ci-artifacts -ItemType Directory -Force | Out-Null
          $maxAttempts = 2
          $passed = $false

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "Starting orchestrated API smoke attempt $attempt/$maxAttempts"
            $log = "../ci-artifacts/api-smoke-orchestrated-attempt-$attempt.log"
            npm run test:agent-orchestrated *>&1 | Tee-Object -FilePath $log

            if ($LASTEXITCODE -eq 0) {
              $passed = $true
              break
            }

            Write-Host "Attempt $attempt failed with exit code $LASTEXITCODE"
          }

          if (-not $passed) {
            Write-Error "Orchestrated API smoke failed after $maxAttempts attempts"
            exit 1
          }

      - name: Upload API smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-smoke-orchestrated-logs
          path: bonsai-workspace/ci-artifacts/
          if-no-files-found: ignore

  android-target-check:
    name: Android Target Check (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (with Android target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            bonsai-workspace/src-tauri

      - name: Cargo check (Android target)
        shell: bash
        run: |
          mkdir -p bonsai-workspace/ci-artifacts
          set -o pipefail
          cargo check \
            --locked \
            --manifest-path "bonsai-workspace/src-tauri/Cargo.toml" \
            --target aarch64-linux-android \
            2>&1 | tee bonsai-workspace/ci-artifacts/cargo-check-android-target.log

      - name: Upload Android target artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-target-check-logs
          path: bonsai-workspace/ci-artifacts/
          if-no-files-found: ignore

  required-checks:
    name: Required Checks Gate
    runs-on: ubuntu-latest
    needs:
      - frontend-quality
      - vscode-extension-quality
      - rust-quality
      - routing-deterministic
      - api-smoke-orchestrated
      - android-target-check
    if: always()

    steps:
      - name: Evaluate dependent jobs
        run: |
          echo "frontend-quality=${{ needs.frontend-quality.result }}"
          echo "vscode-extension-quality=${{ needs.vscode-extension-quality.result }}"
          echo "rust-quality=${{ needs.rust-quality.result }}"
          echo "routing-deterministic=${{ needs.routing-deterministic.result }}"
          echo "api-smoke-orchestrated=${{ needs.api-smoke-orchestrated.result }}"
           echo "android-target-check=${{ needs.android-target-check.result }}"

          if [ "${{ needs.frontend-quality.result }}" != "success" ] || \
             [ "${{ needs.vscode-extension-quality.result }}" != "success" ] || \
             [ "${{ needs.rust-quality.result }}" != "success" ] || \
             [ "${{ needs.routing-deterministic.result }}" != "success" ] || \
             [ "${{ needs.api-smoke-orchestrated.result }}" != "success" ] || \
             [ "${{ needs.android-target-check.result }}" != "success" ]; then
            echo "One or more required checks failed"
            exit 1
          fi

          echo "All required checks passed"
