name: nightly-soak

on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  soak-routing-windows:
    name: Nightly Soak Routing (Windows)
    runs-on: windows-latest
    timeout-minutes: 120
    env:
      BONSAI_UI_STEP_TIMEOUT_MS: "60000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: bonsai-workspace/src/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            bonsai-workspace/src-tauri

      - name: Install frontend deps
        working-directory: bonsai-workspace/src
        run: npm ci

      - name: Run soak loop and collect flaky trend data
        shell: pwsh
        working-directory: bonsai-workspace/src
        run: |
          New-Item -Path ../ci-artifacts -ItemType Directory -Force | Out-Null

          $iterations = 10
          $passCount = 0
          $failCount = 0
          $attemptResults = @()

          for ($i = 1; $i -le $iterations; $i++) {
            Write-Host "Nightly soak iteration $i/$iterations"
            $logPath = "../ci-artifacts/soak-iteration-$i.log"
            npm run test:agent-routing-ci *>&1 | Tee-Object -FilePath $logPath
            $exitCode = $LASTEXITCODE

            if ($exitCode -eq 0) {
              $passCount++
              $attemptResults += @{ iteration = $i; status = "pass"; exitCode = $exitCode }
            } else {
              $failCount++
              $attemptResults += @{ iteration = $i; status = "fail"; exitCode = $exitCode }
            }
          }

          $flakeRate = 0.0
          if ($iterations -gt 0) {
            $flakeRate = [math]::Round(($failCount / $iterations) * 100, 2)
          }

          $summary = [ordered]@{
            workflow = "nightly-soak"
            timestampUtc = (Get-Date).ToUniversalTime().ToString("o")
            iterations = $iterations
            passCount = $passCount
            failCount = $failCount
            flakeRatePercent = $flakeRate
            attempts = $attemptResults
          }

          $summary | ConvertTo-Json -Depth 6 | Set-Content ../ci-artifacts/flaky-trend.json

          $md = @(
            "# Nightly Soak Trend"
            ""
            "- Iterations: $iterations"
            "- Passes: $passCount"
            "- Fails: $failCount"
            "- Flake rate: $flakeRate%"
            ""
            "## Attempt Results"
          )

          foreach ($a in $attemptResults) {
            $md += "- Iteration $($a.iteration): $($a.status) (exit $($a.exitCode))"
          }

          $md -join "`n" | Set-Content ../ci-artifacts/flaky-trend.md

          if ($failCount -gt 0) {
            Write-Error "Nightly soak detected failures ($failCount/$iterations). See artifacts."
            exit 1
          }

      - name: Upload soak artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-soak-artifacts
          path: bonsai-workspace/ci-artifacts/
          if-no-files-found: ignore

  soak-routing-ubuntu:
    name: Nightly Soak Routing (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libsqlite3-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: bonsai-workspace/src/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            bonsai-workspace/src-tauri

      - name: Install frontend deps
        working-directory: bonsai-workspace/src
        run: npm ci

      - name: Run soak loop and collect flaky trend data
        shell: bash
        working-directory: bonsai-workspace/src
        run: |
          mkdir -p ../ci-artifacts

          iterations=10
          pass_count=0
          fail_count=0
          attempts_json="[]"

          for i in $(seq 1 "$iterations"); do
            echo "Nightly soak iteration $i/$iterations"
            log_path="../ci-artifacts/soak-ubuntu-iteration-$i.log"

            set +e
            npm run test:agent-routing-ci >"$log_path" 2>&1
            exit_code=$?
            set -e

            if [ "$exit_code" -eq 0 ]; then
              pass_count=$((pass_count + 1))
              status="pass"
            else
              fail_count=$((fail_count + 1))
              status="fail"
            fi

            attempts_json=$(node -e "const arr=JSON.parse(process.argv[1]);arr.push({iteration:Number(process.argv[2]),status:process.argv[3],exitCode:Number(process.argv[4])});process.stdout.write(JSON.stringify(arr));" "$attempts_json" "$i" "$status" "$exit_code")
          done

          flake_rate=$(node -e "const f=Number(process.argv[1]);const t=Number(process.argv[2]);process.stdout.write((t>0?((f/t)*100).toFixed(2):'0.00'));" "$fail_count" "$iterations")

          node -e "const fs=require('fs');const attempts=JSON.parse(process.argv[1]);const out={workflow:'nightly-soak',platform:'ubuntu',timestampUtc:new Date().toISOString(),iterations:Number(process.argv[2]),passCount:Number(process.argv[3]),failCount:Number(process.argv[4]),flakeRatePercent:Number(process.argv[5]),attempts};fs.writeFileSync(process.argv[6],JSON.stringify(out,null,2));" "$attempts_json" "$iterations" "$pass_count" "$fail_count" "$flake_rate" "../ci-artifacts/flaky-trend-ubuntu.json"

          {
            echo "# Nightly Soak Trend (Ubuntu)"
            echo
            echo "- Iterations: $iterations"
            echo "- Passes: $pass_count"
            echo "- Fails: $fail_count"
            echo "- Flake rate: ${flake_rate}%"
            echo
            echo "## Attempt Results"
            node -e "const attempts=JSON.parse(process.argv[1]);for(const a of attempts){console.log('- Iteration '+a.iteration+': '+a.status+' (exit '+a.exitCode+')');}" "$attempts_json"
          } > ../ci-artifacts/flaky-trend-ubuntu.md

          if [ "$fail_count" -gt 0 ]; then
            echo "Nightly soak detected failures (${fail_count}/${iterations}). See artifacts."
            exit 1
          fi

      - name: Upload soak artifacts (Ubuntu)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-soak-artifacts-ubuntu
          path: bonsai-workspace/ci-artifacts/
          if-no-files-found: ignore

  soak-vscode-extension:
    name: Nightly Extension Quality (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install extension deps
        working-directory: vscode-extension
        run: npm ci

      - name: Run extension quality checks
        working-directory: vscode-extension
        run: |
          mkdir -p ../bonsai-workspace/ci-artifacts
          set -o pipefail
          npm run compile 2>&1 | tee ../bonsai-workspace/ci-artifacts/nightly-extension-compile.log
          npm run test:typecheck 2>&1 | tee ../bonsai-workspace/ci-artifacts/nightly-extension-typecheck.log
          npm run test 2>&1 | tee ../bonsai-workspace/ci-artifacts/nightly-extension-test.log

      - name: Publish extension nightly summary
        if: always()
        shell: bash
        run: |
          mkdir -p bonsai-workspace/ci-artifacts
          cat > bonsai-workspace/ci-artifacts/nightly-extension-summary.md << 'EOF'
          # Nightly Extension Quality Summary

          - Checks: compile, test:typecheck, test
          - Job: soak-vscode-extension
          - Logs:
            - nightly-extension-compile.log
            - nightly-extension-typecheck.log
            - nightly-extension-test.log
          EOF

      - name: Upload extension artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-extension-artifacts
          path: bonsai-workspace/ci-artifacts/
          if-no-files-found: ignore

  nightly-summary:
    name: Nightly Consolidated Summary
    runs-on: ubuntu-latest
    needs:
      - soak-routing-windows
      - soak-routing-ubuntu
      - soak-vscode-extension
    if: always()

    steps:
      - name: Build consolidated nightly summary
        shell: bash
        run: |
          mkdir -p bonsai-workspace/ci-artifacts
          timestamp="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          routing="${{ needs.soak-routing-windows.result }}"
          routing_ubuntu="${{ needs.soak-routing-ubuntu.result }}"
          extension="${{ needs.soak-vscode-extension.result }}"

          overall="success"
          if [ "$routing" != "success" ] || [ "$routing_ubuntu" != "success" ] || [ "$extension" != "success" ]; then
            overall="failure"
          fi

          cat > bonsai-workspace/ci-artifacts/nightly-summary.json <<EOF
          {
            "workflow": "nightly-soak",
            "timestampUtc": "$timestamp",
            "overall": "$overall",
            "jobs": {
              "soak-routing-windows": "$routing",
              "soak-routing-ubuntu": "$routing_ubuntu",
              "soak-vscode-extension": "$extension"
            }
          }
          EOF

          cat > bonsai-workspace/ci-artifacts/nightly-summary.md <<EOF
          # Nightly Consolidated Summary

          - Timestamp (UTC): $timestamp
          - Overall: $overall

          ## Job Results
          - soak-routing-windows: $routing
          - soak-routing-ubuntu: $routing_ubuntu
          - soak-vscode-extension: $extension

          ## Related Artifacts
          - nightly-soak-artifacts
          - nightly-soak-artifacts-ubuntu
          - nightly-extension-artifacts
          EOF

      - name: Upload consolidated nightly summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-summary-artifacts
          path: bonsai-workspace/ci-artifacts/nightly-summary.*
          if-no-files-found: error
