[advisories]
# matrix-sdk 0.7 transitive advisories — only reachable via `--features matrix` (not in default build).
# Upgrading matrix-sdk to 0.9+ would fix these; tracked as a separate work item.
ignore = [
    # matrix-sdk-base 0.7.0: Panic in normalized_power_level() — DoS only, not triggered by our code path
    "RUSTSEC-2025-0065",
    # matrix-sdk-base 0.7.0: DoS via custom m.room.join_rules — not triggered by our code path
    "RUSTSEC-2025-0135",
    # matrix-sdk-crypto 0.7.2: Missing key-rotation signal — informational, no exploit path
    "RUSTSEC-2024-0434",
    # rustls-webpki (via matrix-sdk rustls-tls): TLS cert name constraint issues — transitive, matrix feature only
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0049",

    # Unmaintained transitive deps pulled in by teloxide 0.13 and matrix-sdk 0.7.
    # These are informational; no known exploit in our usage.
    "RUSTSEC-2025-0052",   # async-std discontinued
    "RUSTSEC-2025-0012",   # backoff unmaintained
    "RUSTSEC-2024-0388",   # derivative unmaintained
    "RUSTSEC-2024-0384",   # instant unmaintained
    "RUSTSEC-2024-0370",   # proc-macro-error unmaintained
    "RUSTSEC-2025-0134",   # rustls-pemfile unmaintained (transitive via teloxide → reqwest 0.11)
]
